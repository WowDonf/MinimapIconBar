name: Release

# Triggers on annotated `v*` tag pushes (e.g. `git tag -a v1.0.1 -m "v1.0.1"; git push origin v1.0.1`).
# Tags that don't start with `v` (e.g. `b1.1.1`, `prod`, `draft-1`) are ignored so non-release
# tags can't accidentally publish to CurseForge / Wago.
on:
  push:
    tags:
      - 'v*'

# Needed for GitHub Releases to be created by the packager.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Configure these secrets under Settings → Secrets and variables → Actions.
      # GITHUB_OAUTH is auto-provided; nothing to add for it.
      CF_API_KEY:     ${{ secrets.CF_API_KEY }}
      WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
      GITHUB_OAUTH:   ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Clone project
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history; the packager inspects tags and prior commits

      - name: Package and release
        uses: BigWigsMods/packager@v2
